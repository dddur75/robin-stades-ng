# ============================================================
# REGISTRE_HYPOTHESES v1 — Robin des Stades NG
# Session 2 du comité — 2026-07-06
# Statut : PRÉ-ENREGISTRÉ (aucun backtest lancé — anti-overfit delta 5)
# Règle d'or : toute hypothèse entre NON-TESTÉE. Les "ROI" du
# catalogue source sont considérés comme fiction jusqu'à preuve.
# ============================================================

meta:
  version: 1.0
  source: "97 stratégies Bloom (fichiers David, ère ChatGPT) + Session 2"
  manquantes_catalogue: [87, 92, 94]
  fenetres:
    L5: "5 derniers matchs de championnat (D2 vote 83%)"
    L5_vs_prec: "L5 comparé aux matchs 6 à 10"
    point_in_time: "toute feature calculable à T-1h avec info publique (delta 4)"
  tiers:
    A: "football-data.co.uk seul (résultats, mi-temps, cotes, cartons, corners, arbitre) — toutes ligues FD"
    A*: "A + Understat xG — Ligue 1, PL, Liga, Serie A, Bundesliga, (RFPL exclue)"
    B: "chantier joueurs/compos/absences/coachs (API-Football + Transfermarkt)"
    Bm: "météo historique (Open-Meteo archive + coordonnées stades)"
    C: "PARKING — pas de source propre en v1"
    D: "REJET — conflit avec les règles opératoires (pas de live)"
  statuts: [TESTABLE, ATTENTE_DATA, PARKING, REJET, FUSION]
  marches_etage1: "résultat mesurable dans FD : 1X2, DC, O/U, BTTS, MT, cartons, corners"
  marches_etage2: "notation ROI/CLV : clôtures archivées (1X2, O/U 2.5, AH) + archive maison dès J1"

# ============================================================
# 1. ATOMES — conditions élémentaires composables
#    scope: self = notre équipe, adv = adversaire (miroir auto),
#           match = contexte de la rencontre
# ============================================================
atomes:

  # ---- FORME & SÉRIES (Tier A) ----
  SERIE_VICTOIRES:        {def: "≥3 victoires consécutives championnat", src: FD, tier: A, scope: [self, adv]}
  SERIE_V_LONGUE:         {def: "≥4 victoires consécutives ET écart moyen ≥1.5 but", src: FD, tier: A, scope: [self, adv]}
  SERIE_V_SERREES:        {def: "≥3 victoires consécutives, toutes par 1 but d'écart", src: FD, tier: A, scope: [self, adv]}
  SERIE_SANS_V:           {def: "≥4 matchs sans victoire", src: FD, tier: A, scope: [self, adv]}
  SERIE_NULS:             {def: "≥3 nuls consécutifs", src: FD, tier: A, scope: [self, adv]}
  CRISE_OFFENSIVE:        {def: "≤0.5 but marqué/match sur L5 OU 3 matchs consécutifs sans but", src: FD, tier: A, scope: [self, adv]}
  ATTAQUE_PROLIFIQUE:     {def: "≥2.0 buts marqués/match sur L5", src: FD, tier: A, scope: [self, adv]}
  DEFENSE_PASSOIRE:       {def: "≥2.0 buts encaissés/match sur L5 ET ≥3 matchs L5 avec ≥2 encaissés", src: FD, tier: A, scope: [self, adv]}
  REPRISE_FORME:          {def: "≥2 victoires sur L3 après une série ≥4 sans victoire", src: FD, tier: A, scope: [self, adv]}
  POST_DEFAITE_LOURDE:    {def: "dernier match = défaite par ≥3 buts d'écart", src: FD, tier: A, scope: [self, adv]}
  POST_VICTOIRE_LARGE:    {def: "dernier match = victoire par ≥3 buts d'écart", src: FD, tier: A, scope: [self, adv]}
  POST_VICTOIRE_SURPRISE: {def: "dernier match = victoire avec cote pré-match ≥3.00", src: FD_odds, tier: A, scope: [self, adv]}

  # ---- xG & TENDANCES (Tier A*) ----
  XG_SURPERF:        {def: "buts−xG ≥ +0.5/match en moyenne sur L5", src: US, tier: "A*", scope: [self, adv]}
  XG_SOUSPERF:       {def: "buts−xG ≤ −0.5/match sur L5", src: US, tier: "A*", scope: [self, adv]}
  XG_DIFF_POS:       {def: "xG−xGA ≥ +0.8/match sur L5", src: US, tier: "A*", scope: [self, adv]}
  XG_DIFF_NEG:       {def: "xG−xGA ≤ −0.8/match sur L5", src: US, tier: "A*", scope: [self, adv]}
  XG_ELEVE:          {def: "xG moyen ≥1.75 sur L5", src: US, tier: "A*", scope: [self, adv]}
  XG_FAIBLE:         {def: "xG moyen ≤1.00 sur L5", src: US, tier: "A*", scope: [self, adv]}
  XG_TREND_UP:       {def: "xG(L5) − xG(6-10) ≥ +0.5", src: US, tier: "A*", scope: [self, adv]}
  XG_TREND_DOWN:     {def: "xG(L5) − xG(6-10) ≤ −0.5", src: US, tier: "A*", scope: [self, adv]}
  XGA_TREND_UP:      {def: "xGA(L5) − xGA(6-10) ≥ +0.5 (fragilité croissante)", src: US, tier: "A*", scope: [self, adv]}
  XGA_TREND_DOWN:    {def: "xGA(L5) − xGA(6-10) ≤ −0.5 (verrou qui se ferme)", src: US, tier: "A*", scope: [self, adv]}
  RATIO_FINITION_HAUT: {def: "buts/xG ≥ 1.3 sur L5 (xG cumulé ≥5) — surchauffe", src: US, tier: "A*", scope: [self, adv]}
  RATIO_FINITION_BAS:  {def: "buts/xG ≤ 0.7 sur L5 (xG cumulé ≥5) — froid devant", src: US, tier: "A*", scope: [self, adv]}
  XG_ELEVE_STABLE:   {def: "xG ≥1.75 ET écart-type xG ≤0.35 sur L5", src: US, tier: "A*", scope: [self, adv]}

  # ---- MI-TEMPS & MINUTES (FD pour scores MT ; US pour minutes) ----
  FORT_MT1:          {def: "≥3 des 4 derniers avec but marqué MT1 ET moyenne ≥0.9 but MT1", src: FD, tier: A, scope: [self, adv]}
  ENCAISSE_MT1:      {def: "≥3 des 4 derniers avec but encaissé MT1 ET moyenne ≥0.8", src: FD, tier: A, scope: [self, adv]}
  SOLIDE_MT1:        {def: "≤1 but encaissé sur les 5 dernières MT1", src: FD, tier: A, scope: [self, adv]}
  FORT_MT2:          {def: "≥3 des 4 derniers avec but marqué MT2 ET différentiel MT2 ≥ +0.5", src: FD, tier: A, scope: [self, adv]}
  ENCAISSE_60_90:    {def: "but encaissé entre 60' et 90' dans ≥3 des 4 derniers", src: US_minutes, tier: "A*", scope: [self, adv]}
  O15_MT1_FREQ:      {def: "Over 1.5 buts MT1 dans ≥3 des 4 derniers matchs", src: FD, tier: A, scope: [self, adv]}
  U05_MT1_FREQ:      {def: "0 but MT1 dans ≥3 des 4 derniers matchs", src: FD, tier: A, scope: [self, adv]}

  # ---- DOMICILE / EXTÉRIEUR (Tier A) ----
  FORTERESSE:        {def: "≥70% victoires domicile saison (min 5) ET série ≥3 V domicile", src: FD, tier: A, scope: [self, adv]}
  FAIBLE_DOMICILE:   {def: "≥4 matchs domicile consécutifs sans victoire", src: FD, tier: A, scope: [self, adv]}
  VOYAGEUR_FORT:     {def: "≥60% victoires extérieur saison (min 5) ET série ≥2 V ext", src: FD, tier: A, scope: [self, adv]}
  FAIBLE_EXTERIEUR:  {def: "≥4 déplacements consécutifs sans victoire", src: FD, tier: A, scope: [self, adv]}
  STADE_FERME:       {def: "≤0.7 but encaissé/match sur les 10 derniers domicile ET ≥5 clean sheets (variante xGA≤1.0 en A*)", src: FD, tier: A, scope: [self, adv]}

  # ---- CALENDRIER & FATIGUE ----
  REPOS_COURT:       {def: "≤4 jours depuis le dernier match (championnat + Europe)", src: FD+UEFA, tier: A, scope: [self, adv]}
  REPOS_LONG:        {def: "≥7 jours depuis le dernier match", src: FD+UEFA, tier: A, scope: [self, adv]}
  POST_EUROPE:       {def: "match UCL/UEL/UECL joué dans les 5 jours précédents", src: UEFA_cal, tier: A, scope: [self, adv]}
  POST_EUROPE_ECHEC: {def: "défaite ou élimination européenne dans les 7 jours", src: UEFA_cal, tier: A, scope: [self, adv]}
  DEPLACEMENT_LONG_CUMULE: {def: "≥2 déplacements ≥500 km sur 10 jours (coordonnées stades)", src: FD+GEO, tier: A, scope: [self, adv]}
  POST_TREVE:        {def: "premier match après une trêve internationale (calendrier FIFA)", src: FIFA_cal, tier: A, scope: [self, adv]}

  # ---- ENJEU — moteur classement point-in-time (Tier A via calcul) ----
  LUTTE_TITRE:       {def: "écart au 1er ≤ nb_matchs_restants pts ET ≤10 journées restantes", src: ST, tier: A, scope: [self, adv]}
  LUTTE_MONTEE:      {def: "écart à la zone de montée ≤ nb_matchs_restants pts ET ≤10 journées (D2)", src: ST, tier: A, scope: [self, adv]}
  LUTTE_MAINTIEN:    {def: "écart à la zone rouge ≤ nb_matchs_restants pts ET ≤10 journées", src: ST, tier: A, scope: [self, adv]}
  SANS_ENJEU:        {def: "maintien acquis avec marge ≥ pts_restants+3 ET Europe hors d'atteinte avec retard ≥ pts_restants+3", src: ST, tier: A, scope: [self, adv]}
  RELEGUE_MATH:      {def: "relégation mathématiquement actée", src: ST, tier: A, scope: [self, adv]}
  MONTEE_ASSUREE:    {def: "montée mathématiquement acquise avant la fin", src: ST, tier: A, scope: [self, adv]}
  MAINTIEN_ASSURE_RECENT: {def: "maintien mathématique acquis depuis ≤3 journées, aucun autre objectif", src: ST, tier: A, scope: [self, adv]}
  OBJECTIF_RATE_RECENT:   {def: "élimination mathématique d'un objectif (titre/montée) depuis ≤2 journées", src: ST, tier: A, scope: [self, adv]}
  FENETRE_FIN_SAISON:     {def: "≤8 journées restantes", src: ST, tier: A, scope: [match]}
  FIN_SAISON_FORTE_HISTO: {def: "≥65% de victoires sur les 8 derniers matchs dans ≥2 des 3 saisons passées", src: FD, tier: A, scope: [self, adv]}
  FAIBLE_VS_TOP:     {def: "≤20% de résultats positifs vs moitié haute du classement (saison, min 5 matchs)", src: FD+ST, tier: A, scope: [self, adv]}
  DOMINE_FAIBLES:    {def: "≥75% victoires vs tiers bas du classement (saison, min 4 matchs)", src: FD+ST, tier: A, scope: [self, adv]}
  MATCH_A_ENJEU:     {def: "DERBY OU les deux équipes en LUTTE_* OU confrontation directe (écart ≤3 pts, deux équipes top 6)", src: ST, tier: A, scope: [match]}

  # ---- H2H & DERBYS (Tier A) ----
  H2H_BTTS:          {def: "BTTS dans ≥4 des 5 dernières confrontations directes", src: FD, tier: A, scope: [match]}
  H2H_UNDER25:       {def: "Under 2.5 dans ≥4 des 5 dernières confrontations", src: FD, tier: A, scope: [match]}
  H2H_DOMINATION_LOCALE: {def: "local ≥2V/3 dernières réceptions ET visiteur ≤1V/5 dernières visites ici", src: FD, tier: A, scope: [match]}
  H2H_REVANCHE:      {def: "équipe ayant perdu la dernière confrontation par ≥2 buts", src: FD, tier: A, scope: [self, adv]}
  DERBY:             {def: "paire présente dans DERBYS.yaml (liste statique à constituer, ~40 paires)", src: static, tier: A, scope: [match]}
  DERBY_CHAUD:       {def: "DERBY ET moyenne ≥4 cartons sur les 5 derniers face-à-face", src: FD, tier: A, scope: [match]}

  # ---- DISCIPLINE & ARBITRE (Tier A — colonnes FD cartons + Referee) ----
  EQUIPE_CARTONS:    {def: "moyenne ≥2.5 cartons/match sur L5", src: FD, tier: A, scope: [self, adv]}
  ARBITRE_SEVERE:    {def: "arbitre désigné avec moyenne ≥5.0 cartons/match sur ≥15 matchs (2 saisons)", src: FD, tier: A, scope: [match]}
  SCORING_FOU:       {def: "Over 3.5 dans ≥3 des 4 derniers matchs de l'équipe", src: FD, tier: A, scope: [self, adv]}
  U15_FREQ:          {def: "Under 1.5 dans ≥3 des 4 derniers matchs de l'équipe", src: FD, tier: A, scope: [self, adv]}

  # ---- JOUEURS & STAFF (Tier B — chantier point-in-time) ----
  ABS_TITULAIRE_CLE: {def: "titulaire clé absent (clé = top-3 minutes du poste OU top-3 valeur marchande équipe)", src: AF+TM, tier: B, scope: [self, adv]}
  ABS_DC_CLE:        {def: "défenseur central clé absent", src: AF+TM, tier: B, scope: [self, adv]}
  ABS_2_DEFENSEURS:  {def: "≥2 défenseurs du XI type absents", src: AF+TM, tier: B, scope: [self, adv]}
  ABS_MDF_CLE:       {def: "milieu récupérateur/sentinelle clé absent", src: AF+TM, tier: B, scope: [self, adv]}
  ABS_BUTEUR_DEP:    {def: "buteur totalisant ≥40% des buts saison absent ou incertain", src: AF+TM, tier: B, scope: [self, adv]}
  RETOUR_CLE:        {def: "retour d'un joueur clé après ≥2 matchs d'absence, apte ≥60 min", src: AF+TM, tier: B, scope: [self, adv]}
  PROFONDEUR_FAIBLE: {def: "≥2 titulaires du XI type absents simultanément", src: AF+TM, tier: B, scope: [self, adv]}
  BUTEUR_CHAUD:      {def: "joueur avec ≥3 buts sur ses 3 derniers matchs, titulaire probable", src: AF, tier: B, scope: [self, adv]}
  BUTEUR_FROID:      {def: "buteur principal ≤1 but sur 5 derniers avec xG individuel ≥0.7/match", src: AF+US, tier: B, scope: [self, adv]}
  GARDIEN_CHAUD:     {def: "≥2 clean sheets sur 3 derniers ET ≥80% d'arrêts sur L5", src: AF, tier: B, scope: [self, adv]}
  JEUNESSE_XI:       {def: "≥50% du XI probable âgé de moins de 23 ans", src: AF, tier: B, scope: [self, adv]}
  COACH_NEUF:        {def: "≤3 matchs depuis un changement d'entraîneur", src: AF+TM, tier: B, scope: [self, adv]}

  # ---- MÉTÉO (Tier Bm — Open-Meteo archive + GEO stades, seuils D5) ----
  METEO_EXTREME:     {def: "à l'heure du match : T ≤0°C ou ≥32°C, OU vent ≥40 km/h, OU pluie ≥8 mm/3h", src: OM+GEO, tier: Bm, scope: [match]}

  # ---- MARCHÉ (contexte, FD odds / archive maison) ----
  FAVORI_NET:        {def: "cote 1X2 de l'équipe ≤1.60 (clôture ou dernier relevé)", src: FD_odds, tier: A, scope: [self, adv]}
  OUTSIDER:          {def: "cote 1X2 de l'équipe ≥3.50", src: FD_odds, tier: A, scope: [self, adv]}

