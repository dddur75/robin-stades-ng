# ============================================================
# 3. HYPOTHÈSES COMPOSÉES — le croisement self × adv × match
#    (la couche que le catalogue n'avait pas — Session 2)
#    priorite: P1 = testable Sprint 1 (A/A*), P2 = chantier joueurs,
#              P3 = météo/exotiques
# ============================================================
hypotheses_composees:

  HC-01:
    nom: "Fatigue asymétrique"
    histoire: "Un corps à 3 jours de repos contre un corps à 8 — l'écart se voit au dernier quart d'heure."
    formule: "REPOS_COURT(self) × REPOS_LONG(adv)"
    marches: [X2_adv, DC_adv, AH+0.5_adv, but_60_90_adv]
    tier: A
    priorite: P1
    proposeur: archetype_benham

  HC-02:
    nom: "Gueule de bois européenne"
    histoire: "Retour d'Europe raté + déplacement = jambes et têtes ailleurs."
    formule: "POST_EUROPE_ECHEC(self) × EXTERIEUR × non(POST_EUROPE(adv))"
    marches: [1_adv, DC_adv]
    tier: A
    priorite: P1
    proposeur: quant_clv

  HC-03:
    nom: "Enjeu asymétrique"
    histoire: "Celui qui joue sa vie contre celui qui joue au golf mental — S067 formalisée."
    formule: "SANS_ENJEU(self) × (LUTTE_MAINTIEN|LUTTE_MONTEE|LUTTE_TITRE)(adv) × FENETRE_FIN_SAISON"
    marches: [1X2_adv, DC_adv]
    tier: A
    priorite: P1
    proposeur: archetype_bloom

  HC-04:
    nom: "Forteresse contre voyageur malade"
    histoire: "Le stade qui ne perd pas reçoit l'équipe qui ne gagne jamais dehors."
    formule: "FORTERESSE(self) × FAIBLE_EXTERIEUR(adv)"
    marches: [1, AH-1, CS]
    tier: A
    priorite: P1
    proposeur: archetype_bloom

  HC-05:
    nom: "Régression croisée"
    histoire: "La surchauffe qui refroidit rencontre la machine qui monte en température."
    formule: "RATIO_FINITION_HAUT(self) × XG_FAIBLE(self) × XG_TREND_UP(adv)"
    marches: [2_adv, X2_adv]
    tier: "A*"
    priorite: P1
    proposeur: modelisateur_xg

  HC-06:
    nom: "Duel de passoires"
    histoire: "Deux défenses ouvertes = festival probable."
    formule: "DEFENSE_PASSOIRE(self) × DEFENSE_PASSOIRE(adv)"
    marches: [O2.5, BTTS, O3.5]
    tier: A
    priorite: P1
    proposeur: market_maker

  HC-07:
    nom: "Duel de verrous"
    histoire: "Un verrou qui se ferme contre une attaque en panne sèche."
    formule: "XGA_TREND_DOWN(self) × CRISE_OFFENSIVE(adv)"
    marches: [U2.5, CS, under_adv]
    tier: "A*"
    priorite: P1
    proposeur: modelisateur_xg

  HC-08:
    nom: "Mi-temps 1 croisée"
    histoire: "Celui qui encaisse tôt reçoit celui qui frappe tôt."
    formule: "ENCAISSE_MT1(self) × FORT_MT1(adv)"
    marches: [O0.5_MT1, MT1_adv, O1.5_MT1]
    tier: A
    priorite: P1
    proposeur: quant_clv

  HC-09:
    nom: "Money-time croisé"
    histoire: "La défense qui craque après la 60e contre l'équipe qui finit fort."
    formule: "ENCAISSE_60_90(self) × FORT_MT2(adv)"
    marches: [but_60_90, MT2_adv]
    tier: "A*"
    priorite: P1
    proposeur: wildcard_von_neumann
    note: "marché exotique → Étage 1 lift maintenant, prix via archive maison ensuite"

  HC-10:
    nom: "Derby sous sifflet sévère"
    histoire: "Rivalité chaude + arbitre qui dégaine = pluie de cartons. Colonne Referee de football-data."
    formule: "DERBY_CHAUD × ARBITRE_SEVERE"
    marches: [over_cartons]
    tier: A
    priorite: P1
    proposeur: wildcard_von_neumann
    note: "Étage 1 (résultats cartons FD) ; Étage 2 quand l'archive maison aura les prix cartons"

  HC-11:
    nom: "Frustration contre momentum"
    histoire: "La série de nuls qui ronge contre la série de victoires qui porte."
    formule: "SERIE_NULS(self) × SERIE_VICTOIRES(adv)"
    marches: [2_adv, X2_adv]
    tier: A
    priorite: P1
    proposeur: archetype_benham

  HC-12:
    nom: "Lendemain de fête"
    histoire: "La victoire surprise se paie souvent au match suivant, surtout en déplacement."
    formule: "POST_VICTOIRE_SURPRISE(self) × EXTERIEUR"
    marches: [1_adv, X1_adv]
    tier: A
    priorite: P1
    proposeur: market_maker

  HC-13:
    nom: "Match de gala bilatéral"
    histoire: "Deux équipes en vacances mentales = portes ouvertes."
    formule: "SANS_ENJEU(self) × SANS_ENJEU(adv) × FENETRE_FIN_SAISON"
    marches: [O2.5, BTTS]
    tier: A
    priorite: P1
    proposeur: archetype_bloom

  HC-14:
    nom: "Le signal fondateur"
    histoire: "Ta charnière est à l'infirmerie, leurs attaquants sont en feu. L'hypothèse qui a lancé le projet."
    formule: "(ABS_DC_CLE|ABS_2_DEFENSEURS)(self) × (BUTEUR_CHAUD|XG_SURPERF)(adv)"
    marches: [O2.5, BTTS, over_adv]
    tier: B
    priorite: P2
    proposeur: david

  HC-15:
    nom: "Milieu coupé"
    histoire: "Sans la sentinelle, le bloc se coupe en deux face à une attaque régulière."
    formule: "ABS_MDF_CLE(self) × XG_ELEVE_STABLE(adv)"
    marches: [AH-1_adv, over_adv]
    tier: B
    priorite: P2
    proposeur: archetype_bloom

  HC-16:
    nom: "Dépendance exposée"
    histoire: "L'équipe à un seul poumon offensif visite un stade fermé."
    formule: "ABS_BUTEUR_DEP(self) × STADE_FERME(adv)"
    marches: [under_team, 2_adv, CS_adv]
    tier: B
    priorite: P2
    proposeur: modelisateur_xg

  HC-17:
    nom: "Mur chaud contre finition froide"
    histoire: "Gardien en état de grâce contre attaque qui vendange."
    formule: "GARDIEN_CHAUD(self) × RATIO_FINITION_BAS(adv)"
    marches: [CS, under_adv]
    tier: B
    priorite: P2
    proposeur: quant_clv

  HC-18:
    nom: "Jeunesse en apnée"
    histoire: "Un XI de gamins qui joue le maintien en avril, loin de ses bases."
    formule: "JEUNESSE_XI(self) × LUTTE_MAINTIEN(self) × FENETRE_FIN_SAISON × EXTERIEUR"
    marches: [1_adv, over_adv]
    tier: B
    priorite: P2
    proposeur: archetype_benham

  HC-19:
    nom: "Coach neuf dans la fosse"
    histoire: "Trois matchs de banc, et déjà une forteresse à visiter."
    formule: "COACH_NEUF(self) × FORTERESSE(adv) × EXTERIEUR"
    marches: [1_adv, AH-1_adv]
    tier: B
    priorite: P2
    proposeur: ingenieur_data

  HC-20:
    nom: "Effectif court en surrégime"
    histoire: "Deux titulaires dehors + trois jours de repos = la S100 × la S037."
    formule: "PROFONDEUR_FAIBLE(self) × REPOS_COURT(self)"
    marches: [1X2_adv, over_adv]
    tier: B
    priorite: P2
    proposeur: qa_recetteur

  HC-21:
    nom: "Tempête sur match ouvert"
    histoire: "Le vent fort tue le jeu long et les centres — deux attaques xG élevées rentrent à vide."
    formule: "METEO_EXTREME(vent) × XG_ELEVE(self) × XG_ELEVE(adv)"
    marches: [U2.5]
    tier: Bm
    priorite: P3
    proposeur: wildcard_musk

  HC-22:
    nom: "Long voyage sous le gel"
    histoire: "800 km de car pour jouer par -2°C chez un local habitué."
    formule: "DEPLACEMENT_LONG_CUMULE(self) × METEO_EXTREME(froid)"
    marches: [1_adv, under_team]
    tier: Bm
    priorite: P3
    proposeur: wildcard_musk

  HC-23:
    nom: "Buteur chaud contre passoire"
    histoire: "Le marché buteur est mal pricé sur les books FR — à vérifier contre notre archive."
    formule: "BUTEUR_CHAUD(self) × DEFENSE_PASSOIRE(adv)"
    marches: [buteur, over_team]
    tier: B
    priorite: P3
    proposeur: market_maker
    note: "Étage 2 pur — attend l'archive maison des prix buteurs"

  HC-24:
    nom: "Trêve internationale à deux vitesses"
    histoire: "Post-trêve, l'équipe aux 2 internationaux reçoit celle aux 9 sélectionnés."
    formule: "POST_TREVE × ecart_internationaux(self,adv) ≥ 5"
    marches: [1X2]
    tier: B
    priorite: P2
    proposeur: archetype_benham

  HC-25:
    nom: "Duels contradictoires du catalogue"
    histoire: "Le catalogue affirme A et non-A (S079 vs S081, S035 vs S036, S004 vs S009, S024 vs S044). On ne choisit pas : on backteste les deux et on cherche la condition qui sépare les régimes."
    formule: "paires opposées testées en miroir"
    marches: [selon_paire]
    tier: A
    priorite: P1
    proposeur: statisticien_fdr

# ============================================================
# 4. VAGUE 2 — RECHERCHE MACHINE (pré-cadrée, non lancée)
# ============================================================
vague_2_machine:
  principe: "exploration combinatoire automatique de l'espace des atomes"
  contraintes:
    profondeur_max: 3   # atomes par combinaison
    n_min_out_of_sample: 300
    correction: "Benjamini-Hochberg, q = 0.10"
    stabilite: "edge > 0 sur ≥ 3 fenêtres walk-forward"
    holdout: "saison 2025-26 scellée jusqu'au verdict final"
  declencheur: "après le rapport de la vague 1 (hypothèses pré-enregistrées ci-dessus)"
