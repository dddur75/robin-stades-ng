name: "05 - Confrontation (le juge)"
on:
  workflow_dispatch:
  schedule:
    - cron: "7 10 * * *"    # tous les jours 10:07 UTC
permissions:
  contents: write
concurrency:
  group: confrontation
  cancel-in-progress: false
jobs:
  juge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -r requirements.txt
      - name: Signaux + reglements + rapport
        run: python agents/agent_confrontation.py
      - name: Commit
        run: |
          git config user.name "robin-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase || true
          git add data/confrontation/ rapports/
          git diff --cached --quiet || git commit -m "confrontation: signaux et reglements"
          git push
